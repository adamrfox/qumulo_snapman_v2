services:
  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-3003}:80"
    environment:
      ENABLE_HTTPS: "${ENABLE_HTTPS:-false}"
    volumes:
      - ./certs:/certs
      - snapman_logs:/var/log/snapman
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://snapman:${DB_PASSWORD:-snapman}@db:5432/snapman"
      JWT_SECRET: "${JWT_SECRET}"
      TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      CACHE_PATH: "/data/snapman-cache.db"
      NGINX_LOG_DIR: "/var/log/snapman"
    volumes:
      - snapman_cache:/data
      - snapman_logs:/var/log/snapman:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snapman
      POSTGRES_PASSWORD: "${DB_PASSWORD:-snapman}"
      POSTGRES_DB: snapman
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapman"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  snapman_cache:
  snapman_logs:
