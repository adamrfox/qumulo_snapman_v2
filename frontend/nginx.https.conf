server {
    listen 80 ssl;
    ssl_certificate /certs/tls.crt;
    ssl_certificate_key /certs/tls.key;

    root /usr/share/nginx/html;
    index index.html;

    # Keep the default stdout/stderr targets (docker compose logs frontend)
    # and additionally write into the shared volume the backend reads from
    # for the admin diagnostic-log download (see routers/admin_logs.py).
    access_log /dev/stdout main;
    access_log /var/log/snapman/access.log main;
    error_log /dev/stderr warn;
    error_log /var/log/snapman/error.log warn;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE streams
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
